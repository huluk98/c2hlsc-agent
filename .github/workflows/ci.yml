name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e .
      - name: Run unit tests
        # The 'anthropic' package is intentionally NOT installed: the suite must
        # pass fully offline, exercising the deterministic generator/repair and the
        # LLM-unavailable fallback paths.
        run: python -m unittest discover -s tests
